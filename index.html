<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>中国旅行地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e0e0e0;--dim:#555;--accent:#e07050;--accent2:#f0a060;--glow:rgba(224,112,80,0.4)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none}
canvas{display:block;width:100%;height:100%}
.toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(18,18,26,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;border-bottom:1px solid var(--border)}
.toolbar h1{font-size:16px;font-weight:600;white-space:nowrap}
.toolbar .emoji{font-size:20px}
.mode-toggle{display:flex;background:var(--bg);border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.mode-toggle button{padding:6px 14px;font-size:12px;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:all .2s}
.mode-toggle button.active{background:var(--accent);color:#fff}
.search-box{flex:1;max-width:200px;position:relative}
.search-box input{width:100%;padding:6px 10px;border-radius:16px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;z-index:200;display:none}
.search-results.show{display:block}
.search-results div{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)}
.search-results div:hover{background:rgba(224,112,80,0.15)}
.search-results div .prov{color:var(--dim);font-size:11px;margin-left:4px}
.btn-icon{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.stats-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(18,18,26,0.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:12px 16px;z-index:100;transition:transform .3s;max-height:50vh;overflow-y:auto}
.stats-panel.collapsed{transform:translateY(calc(100% - 44px))}
.stats-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding-bottom:8px}
.stats-toggle h2{font-size:14px;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.stat-card .num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:11px;color:var(--dim);margin-top:2px}
.progress-bar{width:100%;height:6px;background:var(--bg);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s}
.rank-badge{display:inline-block;padding:4px 12px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:600;margin-top:8px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:12px}
.modal .city-info{color:var(--dim);font-size:13px;margin-bottom:12px}
.modal textarea{width:100%;min-height:100px;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;resize:vertical;outline:none}
.modal textarea:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.modal-btns .btn-primary{background:var(--accent);color:#fff}
.modal-btns .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.modal-btns .btn-danger{background:#c0392b;color:#fff}
/* Province detail */
.province-detail{position:fixed;right:0;top:48px;bottom:0;width:280px;background:rgba(18,18,26,0.95);backdrop-filter:blur(10px);border-left:1px solid var(--border);z-index:90;transform:translateX(100%);transition:transform .3s;overflow-y:auto;padding:16px}
.province-detail.show{transform:translateX(0)}
.province-detail h3{font-size:16px;margin-bottom:4px}
.province-detail .close-btn{position:absolute;top:12px;right:12px;cursor:pointer;font-size:18px;color:var(--dim)}
.province-detail .city-list{margin-top:12px}
.province-detail .city-item{padding:8px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .2s;font-size:13px}
.province-detail .city-item:hover{border-color:var(--accent)}
.province-detail .city-item.visited{border-color:var(--accent);background:rgba(224,112,80,0.1)}
.province-detail .city-item .note-preview{color:var(--dim);font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Import/Export panel */
.io-panel{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.io-panel.show{display:flex}
.io-panel .modal{text-align:center}
.io-panel .modal button{margin:6px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.io-panel .modal .btn-primary{background:var(--accent);color:#fff}
.io-panel .modal .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
/* Profile */
.profile-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;transition:all .2s}
.profile-btn:hover{border-color:var(--accent);color:var(--accent)}
.profile-btn .avatar{font-size:14px}
.profile-modal .profile-list{margin:12px 0;max-height:300px;overflow-y:auto}
.profile-modal .profile-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.profile-modal .profile-item:hover{border-color:var(--accent);background:rgba(224,112,80,0.08)}
.profile-modal .profile-item.active{border-color:var(--accent);background:rgba(224,112,80,0.15)}
.profile-modal .profile-item .pi-name{font-size:14px;font-weight:500}
.profile-modal .profile-item .pi-stats{font-size:11px;color:var(--dim);margin-top:2px}
.profile-modal .profile-item .pi-del{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.profile-modal .profile-item .pi-del:hover{border-color:#c0392b;color:#c0392b;background:rgba(192,57,43,0.1)}
.profile-modal .new-profile-row{display:flex;gap:8px;margin-top:12px}
.profile-modal .new-profile-row input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none}
.profile-modal .new-profile-row input:focus{border-color:var(--accent)}
.profile-modal .new-profile-row button{padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap}
/* Import choice modal */
.import-choice-modal .choice-btns{display:flex;flex-direction:column;gap:10px;margin:16px 0}
.import-choice-modal .choice-btns button{padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:14px;text-align:left;transition:all .2s}
.import-choice-modal .choice-btns button:hover{border-color:var(--accent);background:rgba(224,112,80,0.08)}
.import-choice-modal .choice-btns button .desc{font-size:12px;color:var(--dim);margin-top:4px}
@media(max-width:600px){
  .toolbar h1{display:none}
  .search-box{max-width:140px}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .province-detail{width:100%;top:48px}
}
</style>
</head>
<body>
<div class="toolbar">
  <span class="emoji">🗺️</span>
  <button class="profile-btn" onclick="showProfileModal()" title="切换用户"><span class="avatar">👤</span><span id="profileBtnName">默认用户</span></button>
  <div class="mode-toggle">
    <button id="cityModeBtn" class="active" onclick="setMode('city')">城市</button>
    <button id="provModeBtn" onclick="setMode('province')">省份</button>
  </div>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="搜索城市..." oninput="onSearch(this.value)" onfocus="onSearch(this.value)">
    <div id="searchResults" class="search-results"></div>
  </div>
  <button class="btn-icon" onclick="showIOPanel()" title="导入/导出">💾</button>
  <button class="btn-icon" onclick="resetView()" title="重置视图">🏠</button>
</div>

<canvas id="mapCanvas"></canvas>

<div class="stats-panel" id="statsPanel">
  <div class="stats-toggle" onclick="toggleStats()">
    <h2>📊 <span id="rankTitle">家里蹲</span></h2>
    <span id="statsArrow">▲</span>
  </div>
  <div id="statsContent">
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="statProvinces">0/34</div><div class="label">省份</div></div>
      <div class="stat-card"><div class="num" id="statCities">0/362</div><div class="label">城市</div></div>
      <div class="stat-card"><div class="num" id="statPercent">0%</div><div class="label">覆盖率</div></div>
    </div>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <div style="text-align:center"><span class="rank-badge" id="rankBadge">🏠 家里蹲</span></div>
  </div>
</div>

<div class="province-detail" id="provDetail">
  <span class="close-btn" onclick="closeProvDetail()">✕</span>
  <h3 id="provDetailName"></h3>
  <div class="city-info" id="provDetailInfo"></div>
  <div class="city-list" id="provDetailCities"></div>
</div>

<div class="modal-overlay" id="cityModal">
  <div class="modal">
    <h3 id="modalCityName"></h3>
    <div class="city-info" id="modalCityInfo"></div>
    <textarea id="modalNote" placeholder="写点什么...你在这座城市的回忆"></textarea>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeCityModal()">取消</button>
      <button class="btn-danger" id="modalUnvisit" onclick="unvisitCity()">取消打卡</button>
      <button class="btn-primary" onclick="saveCityNote()">保存</button>
    </div>
  </div>
</div>

<div class="io-panel" id="ioPanel">
  <div class="modal">
    <h3>💾 数据管理</h3>
    <div style="margin:16px 0">
      <button class="btn-primary" onclick="exportData()">📥 导出数据</button>
      <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📤 导入数据</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div style="margin:16px 0">
      <button class="btn-primary" onclick="generateShareCard()">🖼️ 生成分享卡</button>
    </div>
    <div style="margin-top:16px">
      <button class="btn-secondary" onclick="closeIOPanel()">关闭</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="profileModal">
  <div class="modal profile-modal">
    <h3>👤 用户管理</h3>
    <div class="profile-list" id="profileList"></div>
    <div class="new-profile-row">
      <input id="newProfileInput" type="text" placeholder="输入新用户名..." maxlength="20">
      <button onclick="createProfile()">新建用户</button>
    </div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="btn-secondary" onclick="closeProfileModal()">关闭</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="importChoiceModal">
  <div class="modal import-choice-modal">
    <h3>📤 导入方式</h3>
    <div class="choice-btns">
      <button onclick="doImportAsNewUser()">
        <div>👤 导入为新用户</div>
        <div class="desc">创建新的用户档案，保留当前数据不变</div>
      </button>
      <button onclick="doImportOverwrite()">
        <div>📝 覆盖当前用户数据</div>
        <div class="desc">替换「<span id="importOverwriteName"></span>」的所有数据</div>
      </button>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeImportChoice()">取消</button>
    </div>
  </div>
</div>

<script>
const PROVINCES = JSON.parse(document.getElementById('provinceData').textContent);
const CITIES = JSON.parse(document.getElementById('cityData').textContent);

// ====== STATE ======
let visited = {}; // {cityName: {note: string, time: number}}
let mode = 'city'; // 'city' or 'province'
let viewX = 0, viewY = 0, viewScale = 1;
let canvas, ctx, W, H;
let isDragging = false, dragStartX, dragStartY, dragViewX, dragViewY;
let lastPinchDist = 0;
let hoveredCity = null, hoveredProvince = null;
let selectedCity = null;
let statsCollapsed = false;
let activeProfile = '默认用户';
let profiles = {}; // { profileName: { visitedCities: {}, notes: {} } }

// Map bounds (lng/lat)
const MAP_BOUNDS = { minLng: 73, maxLng: 136, minLat: 15, maxLat: 54 };

// ====== PROFILE SYSTEM ======
function migrateV1Data() {
  // Migrate old format localStorage data into default profile
  const old = localStorage.getItem('travel-map-data');
  if (old) {
    try {
      const v = JSON.parse(old);
      if (v && typeof v === 'object' && !localStorage.getItem('travelMap_profiles')) {
        profiles['默认用户'] = { visitedCities: v };
        activeProfile = '默认用户';
        saveProfiles();
        localStorage.setItem('travelMap_activeProfile', activeProfile);
        localStorage.removeItem('travel-map-data');
      }
    } catch(e) {}
  }
}

function loadProfiles() {
  try {
    const p = localStorage.getItem('travelMap_profiles');
    if (p) profiles = JSON.parse(p);
    const a = localStorage.getItem('travelMap_activeProfile');
    if (a) activeProfile = a;
  } catch(e) {}
  // Ensure default profile exists
  if (!profiles['默认用户'] && Object.keys(profiles).length === 0) {
    profiles['默认用户'] = { visitedCities: {} };
  }
  if (!profiles[activeProfile]) {
    activeProfile = Object.keys(profiles)[0];
  }
  visited = profiles[activeProfile]?.visitedCities || {};
}

function saveProfiles() {
  profiles[activeProfile] = { visitedCities: visited };
  localStorage.setItem('travelMap_profiles', JSON.stringify(profiles));
  localStorage.setItem('travelMap_activeProfile', activeProfile);
}

function loadData() {
  migrateV1Data();
  loadProfiles();
}

function saveData() {
  saveProfiles();
}

function switchProfile(name) {
  if (!profiles[name]) return;
  // Save current first
  profiles[activeProfile] = { visitedCities: visited };
  activeProfile = name;
  visited = profiles[activeProfile]?.visitedCities || {};
  saveProfiles();
  updateProfileBtn();
  updateStats();
  draw();
  showToast(`👤 已切换到「${name}」`);
}

function createProfile(nameOverride) {
  const input = document.getElementById('newProfileInput');
  const name = nameOverride || input.value.trim();
  if (!name) { showToast('请输入用户名'); return null; }
  if (profiles[name]) { showToast('用户名已存在'); return null; }
  profiles[name] = { visitedCities: {} };
  saveProfiles();
  if (!nameOverride) {
    input.value = '';
    switchProfile(name);
    renderProfileList();
  }
  return name;
}

function deleteProfile(name) {
  if (Object.keys(profiles).length <= 1) { showToast('至少保留一个用户'); return; }
  if (!confirm(`确定删除用户「${name}」？数据不可恢复！`)) return;
  delete profiles[name];
  if (activeProfile === name) {
    activeProfile = Object.keys(profiles)[0];
    visited = profiles[activeProfile]?.visitedCities || {};
  }
  saveProfiles();
  updateProfileBtn();
  updateStats();
  draw();
  renderProfileList();
  showToast(`🗑️ 已删除「${name}」`);
}

function updateProfileBtn() {
  document.getElementById('profileBtnName').textContent = activeProfile;
}

// ====== PROFILE MODAL ======
function showProfileModal() {
  renderProfileList();
  document.getElementById('profileModal').classList.add('show');
}

function closeProfileModal() {
  document.getElementById('profileModal').classList.remove('show');
}

function renderProfileList() {
  const list = document.getElementById('profileList');
  list.innerHTML = Object.keys(profiles).map(name => {
    const data = profiles[name]?.visitedCities || {};
    const count = Object.keys(data).length;
    const provs = new Set(CITIES.filter(c => data[c.n]).map(c => c.p)).size;
    const isActive = name === activeProfile;
    return `<div class="profile-item ${isActive ? 'active' : ''}" onclick="switchProfile('${name.replace(/'/g, "\\'")}')">
      <div>
        <div class="pi-name">${isActive ? '✅ ' : ''}${name}</div>
        <div class="pi-stats">${provs}省 · ${count}城市</div>
      </div>
      ${Object.keys(profiles).length > 1 ? `<button class="pi-del" onclick="event.stopPropagation();deleteProfile('${name.replace(/'/g, "\\'")}')" title="删除">🗑️</button>` : ''}
    </div>`;
  }).join('');
}

// ====== PROJECTION ======
function lngLatToXY(lng, lat) {
  const x = (lng - MAP_BOUNDS.minLng) / (MAP_BOUNDS.maxLng - MAP_BOUNDS.minLng);
  const y = 1 - (lat - MAP_BOUNDS.minLat) / (MAP_BOUNDS.maxLat - MAP_BOUNDS.minLat);
  return [x, y];
}

function screenToMap(sx, sy) {
  const mx = (sx - viewX) / viewScale;
  const my = (sy - viewY) / viewScale;
  return [mx, my];
}

function mapToScreen(mx, my) {
  return [mx * viewScale + viewX, my * viewScale + viewY];
}

// ====== RENDERING ======
function drawProvincePath(province) {
  for (const polygon of province.p) {
    for (const ring of polygon) {
      ctx.beginPath();
      for (let i = 0; i < ring.length; i++) {
        const [x, y] = lngLatToXY(ring[i][0], ring[i][1]);
        const [sx, sy] = mapToScreen(x, y);
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.closePath();
    }
  }
}

function getProvinceVisitCount(provName) {
  const provCities = CITIES.filter(c => c.p === provName);
  const visitedCount = provCities.filter(c => visited[c.n]).length;
  return { total: provCities.length, visited: visitedCount };
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const dpr = window.devicePixelRatio || 1;

  // Draw provinces
  for (const prov of PROVINCES) {
    const vc = getProvinceVisitCount(prov.n);
    
    if (mode === 'province') {
      drawProvincePath(prov);
      if (vc.visited > 0) {
        const intensity = vc.visited / vc.total;
        const alpha = 0.15 + intensity * 0.55;
        ctx.fillStyle = `rgba(224,112,80,${alpha})`;
        ctx.fill();
      } else {
        ctx.fillStyle = 'rgba(30,30,46,0.6)';
        ctx.fill();
      }
    }
    
    // Province borders
    for (const polygon of prov.p) {
      for (const ring of polygon) {
        ctx.beginPath();
        for (let i = 0; i < ring.length; i++) {
          const [x, y] = lngLatToXY(ring[i][0], ring[i][1]);
          const [sx, sy] = mapToScreen(x, y);
          if (i === 0) ctx.moveTo(sx, sy);
          else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        ctx.strokeStyle = mode === 'province' ? 'rgba(224,112,80,0.3)' : 'rgba(60,60,80,0.5)';
        ctx.lineWidth = mode === 'province' ? 1.2 : 0.8;
        ctx.stroke();
      }
    }
    
    // Province labels in province mode
    if (mode === 'province' && prov.c && viewScale > 0.7) {
      const [x, y] = lngLatToXY(prov.c[0], prov.c[1]);
      const [sx, sy] = mapToScreen(x, y);
      const fontSize = Math.max(9, Math.min(14, 11 * viewScale));
      ctx.font = `${fontSize}px sans-serif`;
      ctx.fillStyle = vc.visited > 0 ? '#fff' : 'rgba(150,150,170,0.7)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(prov.n, sx, sy);
      if (vc.visited > 0) {
        ctx.font = `${fontSize - 2}px sans-serif`;
        ctx.fillStyle = 'rgba(240,160,96,0.9)';
        ctx.fillText(`${vc.visited}/${vc.total}`, sx, sy + fontSize);
      }
    }
  }
  
  // Draw cities in city mode
  if (mode === 'city') {
    for (const city of CITIES) {
      const [x, y] = lngLatToXY(city.lng, city.lat);
      const [sx, sy] = mapToScreen(x, y);
      
      // Skip if offscreen
      if (sx < -20 || sx > canvas.width/dpr*dpr + 20 || sy < -20 || sy > canvas.height/dpr*dpr + 20) continue;
      
      const isVisited = !!visited[city.n];
      const isHovered = hoveredCity === city.n;
      const baseR = isVisited ? 4 : 2.5;
      const r = (isHovered ? baseR + 2 : baseR) * Math.min(viewScale, 2);
      
      if (isVisited) {
        // Glow
        ctx.beginPath();
        ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(224,112,80,0.15)';
        ctx.fill();
        // Dot
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#e07050';
        ctx.fill();
        ctx.strokeStyle = '#f0a060';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = isHovered ? 'rgba(150,150,180,0.8)' : 'rgba(80,80,100,0.5)';
        ctx.fill();
      }
      
      // City name
      if ((isVisited || isHovered) && viewScale > 0.8) {
        const fontSize = Math.max(9, Math.min(13, 10 * viewScale));
        ctx.font = `${fontSize}px sans-serif`;
        ctx.fillStyle = isVisited ? '#f0a060' : '#aaa';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(city.n, sx, sy - r - 3);
      }
    }
  }
}

// ====== HIT TESTING ======
function findCityAt(mx, my) {
  let closest = null, closestDist = Infinity;
  for (const city of CITIES) {
    const [x, y] = lngLatToXY(city.lng, city.lat);
    const dx = x - mx, dy = y - my;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const hitR = 12 / viewScale;
    if (dist < hitR && dist < closestDist) {
      closest = city;
      closestDist = dist;
    }
  }
  return closest;
}

function findProvinceAt(mx, my) {
  // Point-in-polygon test
  for (const prov of PROVINCES) {
    for (const polygon of prov.p) {
      const ring = polygon[0]; // outer ring
      let inside = false;
      const pts = ring.map(c => lngLatToXY(c[0], c[1]));
      for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        const xi = pts[i][0], yi = pts[i][1];
        const xj = pts[j][0], yj = pts[j][1];
        if (((yi > my) !== (yj > my)) && mx < (xj - xi) * (my - yi) / (yj - yi) + xi) {
          inside = !inside;
        }
      }
      if (inside) return prov;
    }
  }
  return null;
}

// ====== INTERACTIONS ======
function initCanvas() {
  canvas = document.getElementById('mapCanvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = window.innerWidth;
  H = window.innerHeight;
  draw();
}

function resetView() {
  // Fit China in view with padding
  const pad = 40;
  const topOffset = 48; // toolbar height
  const bottomOffset = 100; // stats panel
  const availW = W - pad * 2;
  const availH = H - topOffset - bottomOffset - pad;
  
  // lngLatToXY returns 0-1 normalized coords
  // mapToScreen does: x * viewScale + viewX
  // So viewScale should map 0-1 to pixel range
  const mapAspect = (MAP_BOUNDS.maxLng - MAP_BOUNDS.minLng) / (MAP_BOUNDS.maxLat - MAP_BOUNDS.minLat);
  const screenAspect = availW / availH;
  
  if (mapAspect > screenAspect) {
    viewScale = availW;
  } else {
    viewScale = availH * mapAspect;
  }
  
  const mapW = viewScale; // width of map in pixels
  const mapH = viewScale / mapAspect; // height of map in pixels
  viewX = (W - mapW) / 2;
  viewY = topOffset + (availH - mapH) / 2;
  draw();
}

// Mouse events
canvas.addEventListener = canvas.addEventListener || function(){};

function setupEvents() {
  // Pointer events
  canvas.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch' && e.isPrimary === false) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragViewX = viewX;
    dragViewY = viewY;
    canvas.setPointerCapture(e.pointerId);
  });
  
  canvas.addEventListener('pointermove', e => {
    if (isDragging) {
      viewX = dragViewX + (e.clientX - dragStartX);
      viewY = dragViewY + (e.clientY - dragStartY);
      draw();
      return;
    }
    // Hover
    const [mx, my] = screenToMap(e.clientX, e.clientY);
    if (mode === 'city') {
      const city = findCityAt(mx, my);
      const newHovered = city ? city.n : null;
      if (newHovered !== hoveredCity) {
        hoveredCity = newHovered;
        canvas.style.cursor = city ? 'pointer' : 'grab';
        draw();
      }
    } else {
      const prov = findProvinceAt(mx, my);
      const newHovered = prov ? prov.n : null;
      if (newHovered !== hoveredProvince) {
        hoveredProvince = newHovered;
        canvas.style.cursor = prov ? 'pointer' : 'grab';
        draw();
      }
    }
  });
  
  canvas.addEventListener('pointerup', e => {
    const wasDrag = Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5;
    isDragging = false;
    if (wasDrag) return;
    
    const [mx, my] = screenToMap(e.clientX, e.clientY);
    if (mode === 'city') {
      const city = findCityAt(mx, my);
      if (city) handleCityClick(city);
    } else {
      const prov = findProvinceAt(mx, my);
      if (prov) showProvDetail(prov.n);
    }
  });
  
  // Wheel zoom
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 0.87;
    const newScale = Math.max(0.3, Math.min(10, viewScale * factor));
    const ratio = newScale / viewScale;
    viewX = e.clientX - (e.clientX - viewX) * ratio;
    viewY = e.clientY - (e.clientY - viewY) * ratio;
    viewScale = newScale;
    draw();
  }, { passive: false });
  
  // Touch pinch zoom
  let touches = {};
  canvas.addEventListener('touchstart', e => {
    for (const t of e.changedTouches) touches[t.identifier] = t;
    if (Object.keys(touches).length === 2) {
      const ids = Object.keys(touches);
      const t1 = touches[ids[0]], t2 = touches[ids[1]];
      lastPinchDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    }
  }, { passive: true });
  
  canvas.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) touches[t.identifier] = t;
    const ids = Object.keys(touches);
    if (ids.length === 2) {
      const t1 = touches[ids[0]], t2 = touches[ids[1]];
      const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
      if (lastPinchDist > 0) {
        const factor = dist / lastPinchDist;
        const cx = (t1.clientX + t2.clientX) / 2;
        const cy = (t1.clientY + t2.clientY) / 2;
        const newScale = Math.max(0.3, Math.min(10, viewScale * factor));
        const ratio = newScale / viewScale;
        viewX = cx - (cx - viewX) * ratio;
        viewY = cy - (cy - viewY) * ratio;
        viewScale = newScale;
        draw();
      }
      lastPinchDist = dist;
    }
  }, { passive: true });
  
  canvas.addEventListener('touchend', e => {
    for (const t of e.changedTouches) delete touches[t.identifier];
    if (Object.keys(touches).length < 2) lastPinchDist = 0;
  }, { passive: true });
  
  // Close search on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-box')) {
      document.getElementById('searchResults').classList.remove('show');
    }
  });
}

// ====== CITY ACTIONS ======
function handleCityClick(city) {
  if (visited[city.n]) {
    openCityModal(city);
  } else {
    visited[city.n] = { note: '', time: Date.now() };
    saveData();
    updateStats();
    showToast(`✅ ${city.n} 已打卡！`);
    draw();
  }
}

function openCityModal(city) {
  selectedCity = city;
  document.getElementById('modalCityName').textContent = city.n;
  document.getElementById('modalCityInfo').textContent = `${city.p} · ${city.lng}°E ${city.lat}°N`;
  document.getElementById('modalNote').value = visited[city.n]?.note || '';
  document.getElementById('cityModal').classList.add('show');
}

function closeCityModal() {
  document.getElementById('cityModal').classList.remove('show');
  selectedCity = null;
}

function saveCityNote() {
  if (!selectedCity) return;
  if (!visited[selectedCity.n]) visited[selectedCity.n] = { time: Date.now() };
  visited[selectedCity.n].note = document.getElementById('modalNote').value;
  saveData();
  showToast('💾 已保存');
  closeCityModal();
  draw();
}

function unvisitCity() {
  if (!selectedCity) return;
  delete visited[selectedCity.n];
  saveData();
  updateStats();
  showToast(`❌ ${selectedCity.n} 已取消打卡`);
  closeCityModal();
  draw();
}

// ====== MODE ======
function setMode(m) {
  mode = m;
  document.getElementById('cityModeBtn').classList.toggle('active', m === 'city');
  document.getElementById('provModeBtn').classList.toggle('active', m === 'province');
  draw();
}

// ====== SEARCH ======
function onSearch(query) {
  const box = document.getElementById('searchResults');
  if (!query.trim()) { box.classList.remove('show'); return; }
  const q = query.toLowerCase();
  const results = CITIES.filter(c => c.n.includes(q) || c.p.includes(q)).slice(0, 10);
  if (results.length === 0) { box.classList.remove('show'); return; }
  box.innerHTML = results.map(c => 
    `<div onclick="selectSearchCity('${c.n}')">${visited[c.n] ? '🔴 ' : '⚪ '}${c.n}<span class="prov">${c.p}</span></div>`
  ).join('');
  box.classList.add('show');
}

function selectSearchCity(name) {
  document.getElementById('searchResults').classList.remove('show');
  document.getElementById('searchInput').value = '';
  const city = CITIES.find(c => c.n === name);
  if (!city) return;
  // Center on city
  const [x, y] = lngLatToXY(city.lng, city.lat);
  viewScale = 2;
  viewX = W/2 - x * viewScale;
  viewY = H/2 - y * viewScale;
  hoveredCity = city.n;
  if (mode !== 'city') setMode('city');
  draw();
  // Auto-visit or open modal
  setTimeout(() => handleCityClick(city), 300);
}

// ====== PROVINCE DETAIL ======
function showProvDetail(provName) {
  const panel = document.getElementById('provDetail');
  document.getElementById('provDetailName').textContent = provName;
  const cities = CITIES.filter(c => c.p === provName);
  const vc = cities.filter(c => visited[c.n]).length;
  document.getElementById('provDetailInfo').textContent = `已打卡 ${vc}/${cities.length} 座城市`;
  
  const list = document.getElementById('provDetailCities');
  list.innerHTML = cities.map(c => {
    const v = visited[c.n];
    return `<div class="city-item ${v ? 'visited' : ''}" onclick="provCityClick('${c.n}')">
      ${v ? '🔴' : '⚪'} ${c.n}
      ${v?.note ? `<div class="note-preview">📝 ${v.note}</div>` : ''}
    </div>`;
  }).join('');
  panel.classList.add('show');
}

function closeProvDetail() {
  document.getElementById('provDetail').classList.remove('show');
}

function provCityClick(name) {
  const city = CITIES.find(c => c.n === name);
  if (!city) return;
  if (visited[name]) {
    openCityModal(city);
  } else {
    visited[name] = { note: '', time: Date.now() };
    saveData();
    updateStats();
    showToast(`✅ ${name} 已打卡！`);
    showProvDetail(city.p);
    draw();
  }
}

// ====== STATS ======
function updateStats() {
  const totalCities = CITIES.length;
  const visitedCities = Object.keys(visited).length;
  const visitedProvs = new Set(CITIES.filter(c => visited[c.n]).map(c => c.p)).size;
  const pct = Math.round(visitedCities / totalCities * 100);
  
  document.getElementById('statProvinces').textContent = `${visitedProvs}/34`;
  document.getElementById('statCities').textContent = `${visitedCities}/${totalCities}`;
  document.getElementById('statPercent').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  
  let rank, emoji;
  if (pct === 0) { rank = '家里蹲'; emoji = '🏠'; }
  else if (pct < 5) { rank = '家里蹲'; emoji = '🏠'; }
  else if (pct < 20) { rank = '初出茅庐'; emoji = '🚶'; }
  else if (pct < 40) { rank = '行者'; emoji = '🎒'; }
  else if (pct < 60) { rank = '旅行达人'; emoji = '✈️'; }
  else if (pct < 80) { rank = '走遍中国'; emoji = '🗺️'; }
  else { rank = '地理大师'; emoji = '👑'; }
  
  document.getElementById('rankTitle').textContent = rank;
  document.getElementById('rankBadge').textContent = `${emoji} ${rank}`;
}

function toggleStats() {
  statsCollapsed = !statsCollapsed;
  document.getElementById('statsPanel').classList.toggle('collapsed', statsCollapsed);
  document.getElementById('statsArrow').textContent = statsCollapsed ? '▲' : '▼';
}

// ====== IMPORT/EXPORT ======
function showIOPanel() { document.getElementById('ioPanel').classList.add('show'); }
function closeIOPanel() { document.getElementById('ioPanel').classList.remove('show'); }

function exportData() {
  const data = { profileName: activeProfile, version: 2, visitedCities: visited, notes: {}, exportTime: new Date().toISOString() };
  // Flatten notes into separate field for v2 compat
  for (const [k, v] of Object.entries(visited)) {
    if (v?.note) data.notes[k] = v.note;
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `travel-map-${activeProfile}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('📥 数据已导出');
}

let pendingImportData = null;

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      // Normalize to visited format
      let importVisited;
      if (data.visitedCities) {
        importVisited = data.visitedCities;
      } else if (data.visited) {
        importVisited = data.visited;
      } else {
        importVisited = data;
      }
      pendingImportData = { visited: importVisited, profileName: data.profileName || '' };
      // Show import choice modal
      document.getElementById('importOverwriteName').textContent = activeProfile;
      document.getElementById('importChoiceModal').classList.add('show');
      closeIOPanel();
    } catch(err) {
      showToast('❌ 文件格式错误');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function closeImportChoice() {
  document.getElementById('importChoiceModal').classList.remove('show');
  pendingImportData = null;
}

function doImportAsNewUser() {
  if (!pendingImportData) return;
  let name = pendingImportData.profileName;
  if (!name || profiles[name]) {
    name = prompt('输入新用户名：', name || '导入用户');
    if (!name) { closeImportChoice(); return; }
  }
  // Ensure unique
  let finalName = name;
  let i = 1;
  while (profiles[finalName]) { finalName = `${name}_${i++}`; }
  profiles[finalName] = { visitedCities: pendingImportData.visited };
  saveProfiles();
  switchProfile(finalName);
  closeImportChoice();
  showToast(`📤 已导入为新用户「${finalName}」，${Object.keys(pendingImportData.visited).length} 座城市`);
}

function doImportOverwrite() {
  if (!pendingImportData) return;
  visited = pendingImportData.visited;
  saveData();
  updateStats();
  draw();
  closeImportChoice();
  showToast(`📤 已覆盖当前用户，${Object.keys(visited).length} 座城市`);
}

function generateShareCard() {
  closeIOPanel();
  showToast('🖼️ 生成中...');
  
  setTimeout(() => {
    const cardW = 800, cardH = 1000;
    const c = document.createElement('canvas');
    c.width = cardW; c.height = cardH;
    const cx = c.getContext('2d');
    
    // Background
    cx.fillStyle = '#0a0a0f';
    cx.fillRect(0, 0, cardW, cardH);
    
    // Border glow
    cx.strokeStyle = 'rgba(224,112,80,0.3)';
    cx.lineWidth = 2;
    cx.strokeRect(20, 20, cardW-40, cardH-40);
    
    // Title
    cx.fillStyle = '#e07050';
    cx.font = 'bold 32px sans-serif';
    cx.textAlign = 'center';
    cx.fillText('🗺️ 我的中国旅行地图', cardW/2, 70);
    
    // Profile name
    cx.fillStyle = '#aaa';
    cx.font = '16px sans-serif';
    cx.fillText(`👤 ${activeProfile}`, cardW/2, 98);
    
    // Draw mini map
    const mapY = 100, mapH = 600;
    const mapScale = Math.min((cardW - 80) / W, mapH / H);
    const mapOffX = (cardW - W * mapScale) / 2;
    
    // Province fills
    for (const prov of PROVINCES) {
      const vc = getProvinceVisitCount(prov.n);
      for (const polygon of prov.p) {
        for (const ring of polygon) {
          cx.beginPath();
          for (let i = 0; i < ring.length; i++) {
            const [x, y] = lngLatToXY(ring[i][0], ring[i][1]);
            const sx = x * mapScale + mapOffX;
            const sy = y * mapScale + mapY;
            if (i === 0) cx.moveTo(sx, sy);
            else cx.lineTo(sx, sy);
          }
          cx.closePath();
          if (vc.visited > 0) {
            const intensity = vc.visited / vc.total;
            cx.fillStyle = `rgba(224,112,80,${0.2 + intensity * 0.5})`;
          } else {
            cx.fillStyle = 'rgba(30,30,46,0.6)';
          }
          cx.fill();
          cx.strokeStyle = 'rgba(100,100,120,0.4)';
          cx.lineWidth = 0.5;
          cx.stroke();
        }
      }
    }
    
    // Visited city dots
    for (const city of CITIES) {
      if (!visited[city.n]) continue;
      const [x, y] = lngLatToXY(city.lng, city.lat);
      const sx = x * mapScale + mapOffX;
      const sy = y * mapScale + mapY;
      cx.beginPath();
      cx.arc(sx, sy, 3, 0, Math.PI * 2);
      cx.fillStyle = '#f0a060';
      cx.fill();
    }
    
    // Stats
    const totalCities = CITIES.length;
    const visitedCities = Object.keys(visited).length;
    const visitedProvs = new Set(CITIES.filter(c => visited[c.n]).map(c => c.p)).size;
    const pct = Math.round(visitedCities / totalCities * 100);
    
    let rank;
    if (pct < 5) rank = '🏠 家里蹲';
    else if (pct < 20) rank = '🚶 初出茅庐';
    else if (pct < 40) rank = '🎒 行者';
    else if (pct < 60) rank = '✈️ 旅行达人';
    else if (pct < 80) rank = '🗺️ 走遍中国';
    else rank = '👑 地理大师';
    
    const statsY = mapY + mapH + 40;
    cx.fillStyle = '#e0e0e0';
    cx.font = 'bold 24px sans-serif';
    cx.textAlign = 'center';
    cx.fillText(rank, cardW/2, statsY);
    
    cx.font = '18px sans-serif';
    cx.fillStyle = '#aaa';
    cx.fillText(`${visitedProvs}个省份 · ${visitedCities}座城市 · 覆盖${pct}%`, cardW/2, statsY + 35);
    
    // Progress bar
    const barX = 100, barW = cardW - 200, barY2 = statsY + 55;
    cx.fillStyle = '#1e1e2e';
    cx.fillRect(barX, barY2, barW, 8);
    cx.fillStyle = '#e07050';
    cx.fillRect(barX, barY2, barW * pct / 100, 8);
    
    // Footer
    cx.fillStyle = '#555';
    cx.font = '13px sans-serif';
    cx.fillText('中国旅行地图 · ' + new Date().toLocaleDateString('zh-CN'), cardW/2, cardH - 30);
    
    // Download
    c.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `travel-map-share-${new Date().toISOString().slice(0,10)}.png`;
      a.click();
      showToast('🖼️ 分享卡已生成');
    });
  }, 100);
}

// ====== TOAST ======
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ====== INIT ======
function init() {
  loadData();
  initCanvas();
  setupEvents();
  resetView();
  updateStats();
  updateProfileBtn();
}

// Close modals on overlay click
document.getElementById('cityModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCityModal();
});
document.getElementById('ioPanel').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeIOPanel();
});
document.getElementById('profileModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeProfileModal();
});
document.getElementById('importChoiceModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeImportChoice();
});

// Init on load
setTimeout(function() {
  try { init(); } catch(e) { console.error('INIT ERROR:', e); }
}, 100);
</script>
